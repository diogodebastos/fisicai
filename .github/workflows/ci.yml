name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
      - name: Score recorded HEPAbench answers
        run: |
          for d in hepabench_results/*/; do
            hepabench score "$(basename "$d")" "$d/answer.json"
          done
      - name: Install tectonic
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net | sh
          sudo mv tectonic /usr/local/bin/
      - name: Validate the shipped analysis bundle
        run: hepabench validate analyses/zmumu_z_mass
